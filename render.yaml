services:
  # PostgreSQL Database
  - type: pserv
    name: collabconnect-db
    env: docker
    plan: free
    region: oregon

  # Backend API Service
  - type: web
    name: collabconnect-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: collabconnect-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health

  # Frontend React App
  - type: web
    name: collabconnect-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: collabconnect-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: REACT_APP_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: collabconnect-db
    databaseName: collabconnect
    user: collabconnect_user
    plan: free
    region: oregon
